<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <clipPath id="screen"><rect x="16" y="16" width="308" height="668" rx="34"/></clipPath>
  </defs>
  <rect x="8" y="8" width="324" height="684" rx="42" fill="#0b0e13"/>
  <g clip-path="url(#screen)">
    <rect x="16" y="16" width="308" height="668" fill="#fbfbfc"/>
    <rect x="16" y="16" width="308" height="668" fill="rgba(10,14,20,0.45)"/>

    <!-- bottom sheet -->
    <g transform="translate(16,308)">
      <rect x="0" y="0" width="308" height="376" rx="22" fill="#ffffff"/>
      <rect x="135" y="14" width="38" height="4" rx="2" fill="#ddd"/>
      <text x="154" y="52" text-anchor="middle" font-size="17" font-weight="700" fill="#131820">Save 9 patients</text>

      <!-- create roster (primary) -->
      <g transform="translate(24,72)">
        <rect width="260" height="70" rx="14" fill="rgba(77,81,108,0.07)" stroke="#4d516c"/>
        <circle cx="30" cy="35" r="14" fill="#4d516c"/>
        <text x="30" y="41" text-anchor="middle" font-size="16" fill="#fff">＋</text>
        <text x="54" y="30" font-size="14.5" font-weight="700" fill="#131820">Create a roster</text>
        <line x1="54" y1="46" x2="240" y2="46" stroke="#e2e6ea"/>
        <text x="54" y="58" font-size="12" fill="#c7c7cd">Roster name</text>
      </g>

      <!-- add to existing -->
      <g transform="translate(24,154)">
        <rect width="260" height="60" rx="14" fill="#fbfbfc" stroke="#ddd"/>
        <circle cx="30" cy="30" r="13" fill="#fff" stroke="#ddd"/>
        <text x="30" y="35" text-anchor="middle" font-size="13" fill="#4d516c">☰</text>
        <text x="54" y="26" font-size="14.5" font-weight="700" fill="#131820">Add to existing roster</text>
        <text x="54" y="44" font-size="11.5" fill="#6f6f6f">Pick from your rosters</text>
        <text x="242" y="35" font-size="14" fill="#c7c7cd">›</text>
      </g>

      <!-- just save -->
      <g transform="translate(24,226)">
        <rect width="260" height="60" rx="14" fill="#fbfbfc" stroke="#ddd"/>
        <circle cx="30" cy="30" r="13" fill="#fff" stroke="#ddd"/>
        <text x="30" y="35" text-anchor="middle" font-size="13" fill="#4d516c">⌕</text>
        <text x="54" y="26" font-size="14.5" font-weight="700" fill="#131820">Just save as patients</text>
        <text x="54" y="44" font-size="11.5" fill="#6f6f6f">Searchable in New Claim — not a roster</text>
        <text x="242" y="35" font-size="14" fill="#c7c7cd">›</text>
      </g>
    </g>
  </g>
</svg>
