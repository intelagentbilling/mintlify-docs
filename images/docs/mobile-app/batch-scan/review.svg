    <line x1="16" y1="628" x2="324" y2="628" stroke="#e2e6ea"/>
    <rect x="32" y="640" width="276" height="40" rx="12" fill="#52bf9f"/>
    <text x="170" y="665" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Save 9 patients</text>
