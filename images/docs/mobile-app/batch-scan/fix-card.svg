<svg viewBox="0 0 340 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="2.2"/></filter>
    <clipPath id="screen"><rect x="16" y="16" width="308" height="668" rx="34"/></clipPath>
  </defs>
  <rect x="8" y="8" width="324" height="684" rx="42" fill="#0b0e13"/>
  <g clip-path="url(#screen)">
    <rect x="16" y="16" width="308" height="668" fill="#fbfbfc"/>
    <!-- dimmed review behind -->
    <rect x="16" y="16" width="308" height="668" fill="rgba(10,14,20,0.45)"/>

    <!-- bottom sheet -->
    <g transform="translate(16,300)">
      <rect x="0" y="0" width="308" height="384" rx="22" fill="#ffffff"/>
      <rect x="135" y="14" width="38" height="4" rx="2" fill="#ddd"/>
      <text x="154" y="52" text-anchor="middle" font-size="17" font-weight="700" fill="#131820">Fix card</text>
      <text x="154" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#e04668">Version code not recognized</text>

      <!-- fields -->
      <g transform="translate(24,92)">
        <text x="0" y="10" font-size="10.5" font-weight="700" letter-spacing="0.4" fill="#6f6f6f">HEALTH NUMBER</text>
        <rect x="0" y="18" width="168" height="42" rx="10" fill="#fff" stroke="#ddd"/>
        <text x="12" y="45" font-size="16" fill="#131820" filter="url(#blur)">1098 445 320</text>

        <text x="184" y="10" font-size="10.5" font-weight="700" letter-spacing="0.4" fill="#6f6f6f">VERSION</text>
        <rect x="184" y="18" width="76" height="42" rx="10" fill="#fff" stroke="#3a7ab8" stroke-width="1.5"/>
        <text x="196" y="45" font-size="16" font-weight="700" fill="#131820">XL</text>
      </g>

      <!-- re-check -->
      <g transform="translate(24,178)">
        <rect width="260" height="60" rx="14" fill="rgba(77,81,108,0.07)" stroke="#4d516c"/>
        <circle cx="30" cy="30" r="13" fill="#4d516c"/>
        <text x="30" y="35" text-anchor="middle" font-size="14" fill="#fff">↻</text>
        <text x="54" y="26" font-size="14.5" font-weight="700" fill="#131820">Re-check with OHIP</text>
        <text x="54" y="44" font-size="11.5" fill="#6f6f6f">Validate the corrected number</text>
      </g>

      <!-- rescan -->
      <g transform="translate(24,250)">
        <rect width="260" height="60" rx="14" fill="#fbfbfc" stroke="#ddd"/>
        <circle cx="30" cy="30" r="13" fill="#fff" stroke="#ddd"/>
        <text x="30" y="35" text-anchor="middle" font-size="13" fill="#4d516c">▣</text>
        <text x="54" y="26" font-size="14.5" font-weight="700" fill="#131820">Rescan this card</text>
        <text x="54" y="44" font-size="11.5" fill="#6f6f6f">Point the camera at the single card</text>
        <text x="242" y="35" font-size="14" fill="#c7c7cd">›</text>
      </g>
    </g>
  </g>
</svg>
